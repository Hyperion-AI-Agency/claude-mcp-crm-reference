name: "[CI] Test Suite"

on:
  workflow_call:
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.2.1"

jobs:
  gitleaks:
    name: GitLeaks Scan
    uses: ./.github/workflows/gitleaks.yml
    secrets: inherit

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install

      - name: Run pytest
        run: poetry run pytest --cov --cov-report=term
